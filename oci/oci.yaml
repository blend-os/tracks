track: "base"

modules:
  - name: exec
    run: |
      for cmd in "$@"; do
        bash -s <<< "$cmd"
      done

needs-update:
  - |
    [[ "$(cat /usr/revision)" != "$(skopeo inspect "$BASE_IMAGE_NAME" | jq '.Labels."org.opencontainers.image.revision" // "none"' -Mcrj)" ]]

auto-update:
  enabled: true
  interval: 3600

distro-config:
  initialise: |
    set -e

    mkdir -p ./var/cache/blendOS/container/blobs

    if [[ -z "$BASE_IMAGE_NAME" ]]; then
      echo "E: no OCI image name specified"
      echo "I: (define BASE_IMAGE_NAME in env section)"
      exit 1
    fi

    rm -rf ./var/cache/blendOS/container/image
    skopeo copy "$BASE_IMAGE_NAME" --dest-shared-blob-dir=./var/cache/blendOS/container/blobs oci:./var/cache/blendOS/container/image:main
    rm -rf ./var/cache/blendOS/container/image/blobs
    ln -s ../blobs ./var/cache/blendOS/container/image/blobs
    umoci unpack --image ./var/cache/blendOS/container/image:main bundle
    rm ./var/cache/blendOS/container/image/blobs
    rm -rf ./var/cache/blendOS/container/image

    cp -ax bundle/"$(jq '.root.path // "rootfs"' -Mcrj bundle/config.json)"/* .
    jq '.annotations."org.opencontainers.image.revision" // empty' -Mcrj bundle/config.json > ./usr/revision
    rm -rf bundle

    ln -sfn usr/lib64 ./lib64
    ln -sfn usr/sbin ./sbin

    cp /etc/locale.gen ./etc
    cp /etc/locale.conf ./etc

env:
  BASE_IMAGE_NAME: ""

boot:
  type: uefi
  loader: grub
